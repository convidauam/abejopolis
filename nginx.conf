server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Tipos MIME clave
  types {
    application/wasm         wasm;
    application/javascript   js;
    application/octet-stream data;
    text/html                html;
    application/gzip         gz;
  }

  # Si existen .gz y el cliente acepta gzip, Nginx los sirve automaticamente
  gzip_static on;
  gzip_vary on;

  # Rutas generales
  location / {
    try_files $uri $uri/ /index.html =404;
  }

  # Solicitudes directas a .gz (por si se referencian explicitamente)
  location ~* \.wasm\.gz$ {
    types { }
    default_type application/wasm;
    add_header Content-Encoding gzip always;
    add_header Vary Accept-Encoding always;
    try_files $uri =404;
  }

  location ~* \.data\.gz$ {
    types { }
    default_type application/octet-stream;
    add_header Content-Encoding gzip always;
    add_header Vary Accept-Encoding always;
    try_files $uri =404;
  }

  location ~* \.js\.gz$ {
    types { }
    default_type application/javascript;
    add_header Content-Encoding gzip always;
    add_header Vary Accept-Encoding always;
    try_files $uri =404;
  }

  # Peticiones sin .gz: sirve .gz si existe; si no, el archivo original
  location ~* \.wasm$ {
    default_type application/wasm;
    try_files $uri.gz $uri =404;
  }

  location ~* \.data$ {
    default_type application/octet-stream;
    try_files $uri.gz $uri =404;
  }

  location ~* \.js$ {
    default_type application/javascript;
    try_files $uri.gz $uri =404;
  }

  # Bundles (Addressables)
  location ~ \.bundle$ {
    add_header Cache-Control "no-store";
    add_header Access-Control-Allow-Origin "*";
  }
  
  # StreamingAssets y Addressables
  location /StreamingAssets/ {
    add_header Cache-Control "no-store";
    add_header Access-Control-Allow-Origin "*";
  }

  # COOP/COEP por si usas threads / SharedArrayBuffer
  add_header Cross-Origin-Opener-Policy same-origin always;
  add_header Cross-Origin-Embedder-Policy require-corp always;
}
